{% extends "base.html" %}
{% block content %}
<div class="row">
    {% for item in items %}
    <div class="col-md-4">
        <div class="card">
            <img src="{{ item.image_url }}">
            <h5>{{ item.name }}</h5>
            <p>{{ item.price }}</p>
            <form action="{{ url_for('cart_add', item_id=item.id) }}">...</form>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
