{% extends "base.html" %}
{% block content %}
<h2>My Shopping Cart</h2>
<table>
    {% for row in cart_items %}
    <tr>
        <td>{{ row.item.name }}</td>
        <td>{{ row.quantity }}</td>
        <td>{{ row.total_price }}</td>
    </tr>
    {% endfor %}
</table>
<form action="{{ url_for('checkout') }}" method="POST">...</form>
{% endblock %}
